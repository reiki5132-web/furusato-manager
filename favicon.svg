<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <pattern id="asanoha" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M24 0 L48 24 L24 48 L0 24 Z" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
      <path d="M0 0 L48 48 M48 0 L0 48" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
    </pattern>
    <filter id="softShadow3" x="-20%" y="-20%" width="140%" height="140%">
