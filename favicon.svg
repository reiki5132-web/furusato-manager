      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg3)"/>
  <g filter="url(#softShadow3)">
    <path d="M120 330 Q 120 200, 256 200 Q 392 200, 392 330 Q 392 420, 256 420 Q 120 420, 120 330 Z" fill="url(#cloth)"/>
    <path d="M120 330 Q 120 200, 256 200 Q 392 200, 392 330 Q 392 420, 256 420 Q 120 420, 120 330 Z" fill="url(#asanoha)"/>
    <path d="M200 208 Q 230 140, 256 170 Q 282 140, 312 208 Q 290 182, 256 190 Q 222 182, 200 208 Z"
          fill="url(#cloth)" stroke="#9a3412" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="256" cy="200" rx="40" ry="14" fill="#9a3412" opacity="0.25"/>
  </g>
</svg>
