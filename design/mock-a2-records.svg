<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <pattern id="asanoha2" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <g stroke="#78716c" stroke-width="0.6" fill="none" opacity="0.18">
        <path d="M24 0 L48 24 L24 48 L0 24 Z"/>
        <path d="M0 0 L48 48 M48 0 L0 48"/>
        <path d="M24 0 L24 48 M0 24 L48 24"/>
      </g>
    </pattern>
  </defs>
  <rect width="390" height="844" fill="#faf7f2"/>
  <rect width="390" height="844" fill="url(#asanoha2)"/>

  <text x="28" y="30" font-size="14" font-weight="600" fill="#0c0a09">17:50</text>

  <!-- Header -->
  <circle cx="20" cy="80" r="3" fill="#b91c1c"/>
  <text x="24" y="90" font-size="24" font-weight="700" fill="#0c0a09" font-family="'Hiragino Mincho ProN','Yu Mincho',serif">寄付記録</text>
  <text x="24" y="112" font-size="12" fill="#78716c">2026年</text>
  <!-- add button top-right -->
  <rect x="290" y="70" width="80" height="34" fill="#b91c1c" rx="4"/>
  <text x="330" y="91" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">＋ 追加</text>

  <!-- Filter chips -->
  <g font-size="12">
    <rect x="20" y="132" width="60" height="30" fill="#0c0a09" rx="15"/>
    <text x="50" y="151" fill="#ffffff" text-anchor="middle" font-weight="600">全員</text>
    <rect x="88" y="132" width="60" height="30" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="15"/>
    <text x="118" y="151" fill="#0c0a09" text-anchor="middle">りの</text>
    <rect x="156" y="132" width="52" height="30" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="15"/>
    <text x="182" y="151" fill="#0c0a09" text-anchor="middle">母</text>
  </g>

  <!-- Sum strip -->
  <rect x="20" y="180" width="350" height="54" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <rect x="20" y="180" width="3" height="54" fill="#b91c1c"/>
  <text x="40" y="200" font-size="11" fill="#78716c">合計</text>
  <text x="40" y="224" font-size="20" font-weight="700" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">¥28,000</text>
  <text x="350" y="202" font-size="11" fill="#78716c" text-anchor="end">件数</text>
  <text x="350" y="224" font-size="18" font-weight="700" fill="#0c0a09" text-anchor="end" font-family="'Hiragino Mincho ProN',serif">3件</text>

  <!-- Record 1 -->
  <rect x="20" y="260" width="350" height="90" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="284" font-size="10" fill="#b91c1c" font-weight="600">2026.03.15</text>
  <text x="36" y="308" font-size="15" font-weight="600" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">北海道 紋別市</text>
  <text x="36" y="328" font-size="11" fill="#78716c">ホタテ貝柱 1kg</text>
  <text x="354" y="308" font-size="17" font-weight="700" fill="#0c0a09" text-anchor="end" font-family="'Hiragino Mincho ProN',serif">¥15,000</text>
  <rect x="292" y="320" width="60" height="22" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1" rx="3"/>
  <text x="322" y="335" font-size="10" fill="#0c0a09" text-anchor="middle">りの</text>

  <!-- Record 2 -->
  <rect x="20" y="360" width="350" height="90" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="384" font-size="10" fill="#b91c1c" font-weight="600">2026.02.28</text>
  <text x="36" y="408" font-size="15" font-weight="600" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">山形県 天童市</text>
  <text x="36" y="428" font-size="11" fill="#78716c">シャインマスカット 2kg</text>
  <text x="354" y="408" font-size="17" font-weight="700" fill="#0c0a09" text-anchor="end" font-family="'Hiragino Mincho ProN',serif">¥8,000</text>
  <rect x="300" y="420" width="52" height="22" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1" rx="3"/>
  <text x="326" y="435" font-size="10" fill="#0c0a09" text-anchor="middle">母</text>

  <!-- Record 3 -->
  <rect x="20" y="460" width="350" height="90" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="484" font-size="10" fill="#b91c1c" font-weight="600">2026.01.20</text>
  <text x="36" y="508" font-size="15" font-weight="600" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">佐賀県 唐津市</text>
  <text x="36" y="528" font-size="11" fill="#78716c">佐賀牛ロース 500g</text>
  <text x="354" y="508" font-size="17" font-weight="700" fill="#0c0a09" text-anchor="end" font-family="'Hiragino Mincho ProN',serif">¥5,000</text>
  <rect x="292" y="520" width="60" height="22" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1" rx="3"/>
  <text x="322" y="535" font-size="10" fill="#0c0a09" text-anchor="middle">りの</text>

  <!-- Bottom nav -->
  <rect x="0" y="760" width="390" height="84" fill="#ffffff"/>
  <line x1="0" y1="760" x2="390" y2="760" stroke="#e7e5e4" stroke-width="1"/>
  <g transform="translate(49 790)" stroke="#78716c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <path d="M -10 2 L 0 -8 L 10 2 L 10 10 L -10 10 Z" fill="#ffffff"/>
    <path d="M -4 10 L -4 4 L 4 4 L 4 10"/>
  </g>
  <text x="49" y="828" font-size="11" fill="#78716c" text-anchor="middle">ホーム</text>

  <rect x="122" y="760" width="50" height="3" fill="#b91c1c"/>
  <g transform="translate(146 790)" stroke="#b91c1c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <rect x="-8" y="-9" width="16" height="20" rx="1.5" fill="#fef2f2"/>
    <rect x="-4" y="-12" width="8" height="5" rx="1" fill="#fef2f2"/>
    <line x1="-4" y1="-2" x2="4" y2="-2"/>
    <line x1="-4" y1="3" x2="4" y2="3"/>
    <line x1="-4" y1="8" x2="2" y2="8"/>
  </g>
  <text x="146" y="828" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">寄付記録</text>

  <g transform="translate(243 790)" stroke="#78716c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <rect x="-10" y="-4" width="20" height="14" rx="1.5" fill="#ffffff"/>
    <rect x="-11" y="-7" width="22" height="5" rx="1" fill="#ffffff"/>
    <line x1="0" y1="-7" x2="0" y2="10"/>
    <path d="M 0 -7 C -6 -14, -12 -10, -6 -7" fill="#ffffff"/>
    <path d="M 0 -7 C 6 -14, 12 -10, 6 -7" fill="#ffffff"/>
  </g>
  <text x="243" y="828" font-size="11" fill="#78716c" text-anchor="middle">返礼品</text>

  <g transform="translate(340 790)" stroke="#78716c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    <g stroke-linecap="round">
      <line x1="0" y1="-11" x2="0" y2="-7"/>
      <line x1="0" y1="11" x2="0" y2="7"/>
      <line x1="-11" y1="0" x2="-7" y2="0"/>
      <line x1="11" y1="0" x2="7" y2="0"/>
      <line x1="-8" y1="-8" x2="-5" y2="-5"/>
      <line x1="8" y1="-8" x2="5" y2="-5"/>
      <line x1="-8" y1="8" x2="-5" y2="5"/>
      <line x1="8" y1="8" x2="5" y2="5"/>
    </g>
  </g>
  <text x="340" y="828" font-size="11" fill="#78716c" text-anchor="middle">設定</text>
