<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <pattern id="asanohaA" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <g stroke="#78716c" stroke-width="0.6" fill="none" opacity="0.18">
        <path d="M24 0 L48 24 L24 48 L0 24 Z"/>
        <path d="M0 0 L48 48 M48 0 L0 48"/>
        <path d="M24 0 L24 48 M0 24 L48 24"/>
      </g>
    </pattern>
  </defs>
  <rect width="390" height="844" fill="#faf7f2"/>
  <rect width="390" height="844" fill="url(#asanohaA)"/>

  <!-- Status bar -->
  <text x="28" y="30" font-size="14" font-weight="600" fill="#0c0a09">17:50</text>

  <!-- Header -->
  <text x="24" y="90" font-size="26" font-weight="700" fill="#0c0a09" font-family="'Hiragino Mincho ProN','Yu Mincho',serif">ホーム</text>
  <circle cx="20" cy="80" r="3" fill="#b91c1c"/>
  <text x="24" y="115" font-size="13" fill="#78716c">2026年 寄付状況</text>

  <!-- Summary card 1 -->
  <rect x="20" y="140" width="350" height="130" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <rect x="20" y="140" width="3" height="130" fill="#b91c1c"/>
  <text x="40" y="170" font-size="12" fill="#78716c">年間上限額 合計</text>
  <text x="40" y="210" font-size="32" font-weight="700" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">¥124,000</text>
  <text x="40" y="235" font-size="11" fill="#78716c">使用額  ¥0  ／  残り  ¥124,000</text>
  <rect x="40" y="248" width="310" height="3" fill="#f5f5f4"/>
  <rect x="40" y="248" width="0" height="3" fill="#b91c1c"/>

  <!-- Member cards title -->
  <text x="20" y="305" font-size="13" font-weight="600" fill="#0c0a09">家族メンバー</text>
  <line x1="100" y1="300" x2="370" y2="300" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Member card りの -->
  <rect x="20" y="320" width="350" height="90" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <g transform="translate(50 365)">
    <ellipse cx="0" cy="0" rx="18" ry="18" fill="#fafaf9" stroke="#1c1917" stroke-width="1.5"/>
    <ellipse cx="-6" cy="-10" rx="2" ry="8" fill="#fbcfe8" stroke="#1c1917" stroke-width="1"/>
    <ellipse cx="6" cy="-10" rx="2" ry="8" fill="#fbcfe8" stroke="#1c1917" stroke-width="1"/>
  </g>
  <text x="90" y="350" font-size="16" font-weight="600" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">りの</text>
  <text x="90" y="375" font-size="11" fill="#78716c">上限 ¥44,000</text>
  <text x="90" y="393" font-size="11" fill="#78716c">残り ¥44,000  (100%)</text>
  <rect x="270" y="358" width="80" height="4" fill="#f5f5f4" rx="2"/>
  <rect x="270" y="358" width="80" height="4" fill="#b91c1c" rx="2"/>
  <text x="350" y="350" font-size="10" fill="#78716c" text-anchor="end">100%</text>

  <!-- Member card 母 -->
  <rect x="20" y="420" width="350" height="90" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <g transform="translate(50 465)">
    <ellipse cx="0" cy="0" rx="18" ry="18" fill="#fafaf9" stroke="#1c1917" stroke-width="1.5"/>
    <ellipse cx="-6" cy="-10" rx="2" ry="8" fill="#fbcfe8" stroke="#1c1917" stroke-width="1"/>
    <ellipse cx="6" cy="-10" rx="2" ry="8" fill="#fbcfe8" stroke="#1c1917" stroke-width="1"/>
  </g>
  <text x="90" y="450" font-size="16" font-weight="600" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">母</text>
  <text x="90" y="475" font-size="11" fill="#78716c">上限 ¥80,000</text>
  <text x="90" y="493" font-size="11" fill="#78716c">残り ¥80,000  (100%)</text>
  <rect x="270" y="458" width="80" height="4" fill="#f5f5f4" rx="2"/>
  <rect x="270" y="458" width="80" height="4" fill="#b91c1c" rx="2"/>

  <!-- CTA button (primary) -->
  <rect x="20" y="550" width="350" height="48" fill="#b91c1c" rx="4"/>
  <text x="195" y="580" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">＋ 寄付を記録する</text>

  <!-- Secondary button (white knockout on black) -->
  <rect x="20" y="610" width="350" height="46" fill="#0c0a09" rx="4"/>
  <text x="195" y="639" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">返礼品を追加</text>

  <!-- Bottom nav -->
  <rect x="0" y="760" width="390" height="84" fill="#ffffff"/>
  <line x1="0" y1="760" x2="390" y2="760" stroke="#e7e5e4" stroke-width="1"/>

  <!-- active: ホーム (red indicator on top) -->
  <rect x="24" y="760" width="50" height="3" fill="#b91c1c"/>
  <g transform="translate(49 790)" stroke="#b91c1c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <path d="M -10 2 L 0 -8 L 10 2 L 10 10 L -10 10 Z" fill="#fef2f2"/>
    <path d="M -4 10 L -4 4 L 4 4 L 4 10"/>
  </g>
  <text x="49" y="828" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">ホーム</text>

  <!-- 寄付記録 -->
  <g transform="translate(146 790)" stroke="#78716c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <rect x="-8" y="-9" width="16" height="20" rx="1.5" fill="#ffffff"/>
    <rect x="-4" y="-12" width="8" height="5" rx="1" fill="#fafaf9"/>
    <line x1="-4" y1="-2" x2="4" y2="-2"/>
    <line x1="-4" y1="3" x2="4" y2="3"/>
    <line x1="-4" y1="8" x2="2" y2="8"/>
  </g>
  <text x="146" y="828" font-size="11" fill="#78716c" text-anchor="middle">寄付記録</text>

  <!-- 返礼品 -->
  <g transform="translate(243 790)" stroke="#78716c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <rect x="-10" y="-4" width="20" height="14" rx="1.5" fill="#ffffff"/>
    <rect x="-11" y="-7" width="22" height="5" rx="1" fill="#ffffff"/>
    <line x1="0" y1="-7" x2="0" y2="10"/>
    <path d="M 0 -7 C -6 -14, -12 -10, -6 -7" fill="#ffffff"/>
    <path d="M 0 -7 C 6 -14, 12 -10, 6 -7" fill="#ffffff"/>
  </g>
  <text x="243" y="828" font-size="11" fill="#78716c" text-anchor="middle">返礼品</text>

  <!-- 設定 -->
  <g transform="translate(340 790)" stroke="#78716c" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    <g stroke-linecap="round">
      <line x1="0" y1="-11" x2="0" y2="-7"/>
      <line x1="0" y1="11" x2="0" y2="7"/>
      <line x1="-11" y1="0" x2="-7" y2="0"/>
      <line x1="11" y1="0" x2="7" y2="0"/>
      <line x1="-8" y1="-8" x2="-5" y2="-5"/>
      <line x1="8" y1="-8" x2="5" y2="-5"/>
      <line x1="-8" y1="8" x2="-5" y2="5"/>
      <line x1="8" y1="8" x2="5" y2="5"/>
    </g>
  </g>
  <text x="340" y="828" font-size="11" fill="#78716c" text-anchor="middle">設定</text>
</svg>
