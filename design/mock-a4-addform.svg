<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <pattern id="asanoha4" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <g stroke="#78716c" stroke-width="0.6" fill="none" opacity="0.18">
        <path d="M24 0 L48 24 L24 48 L0 24 Z"/>
        <path d="M0 0 L48 48 M48 0 L0 48"/>
        <path d="M24 0 L24 48 M0 24 L48 24"/>
      </g>
    </pattern>
  </defs>
  <rect width="390" height="844" fill="#faf7f2"/>
  <rect width="390" height="844" fill="url(#asanoha4)"/>

  <text x="28" y="30" font-size="14" font-weight="600" fill="#0c0a09">17:50</text>

  <!-- Back & Title -->
  <text x="24" y="90" font-size="22" font-weight="600" fill="#0c0a09">＜</text>
  <circle cx="46" cy="80" r="3" fill="#b91c1c"/>
  <text x="52" y="90" font-size="22" font-weight="700" fill="#0c0a09" font-family="'Hiragino Mincho ProN','Yu Mincho',serif">寄付を記録</text>

  <!-- Field: 寄付者 -->
  <text x="24" y="140" font-size="12" font-weight="600" fill="#78716c">寄付者</text>
  <g font-size="13">
    <rect x="20" y="150" width="100" height="38" fill="#0c0a09" rx="4"/>
    <text x="70" y="174" fill="#ffffff" text-anchor="middle" font-weight="600">りの</text>
    <rect x="128" y="150" width="100" height="38" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
    <text x="178" y="174" fill="#0c0a09" text-anchor="middle">母</text>
  </g>

  <!-- Field: 日付 -->
  <text x="24" y="220" font-size="12" font-weight="600" fill="#78716c">日付</text>
  <rect x="20" y="230" width="350" height="44" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="258" font-size="15" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">2026年 4月 22日</text>
  <g transform="translate(345 252)" stroke="#78716c" stroke-width="1.4" fill="none">
    <rect x="-10" y="-8" width="20" height="16" rx="2"/>
    <line x1="-10" y1="-3" x2="10" y2="-3"/>
    <line x1="-5" y1="-12" x2="-5" y2="-6"/>
    <line x1="5" y1="-12" x2="5" y2="-6"/>
  </g>

  <!-- Field: 自治体名 -->
  <text x="24" y="304" font-size="12" font-weight="600" fill="#78716c">自治体名</text>
  <rect x="20" y="314" width="350" height="44" fill="#ffffff" stroke="#b91c1c" stroke-width="1.5" rx="4"/>
  <text x="36" y="342" font-size="15" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">北海道 紋別市</text>

  <!-- Field: 返礼品 -->
  <text x="24" y="388" font-size="12" font-weight="600" fill="#78716c">返礼品</text>
  <rect x="20" y="398" width="350" height="44" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="426" font-size="15" fill="#0c0a09" font-family="'Hiragino Mincho ProN',serif">ホタテ貝柱 1kg</text>

  <!-- Field: 金額 -->
  <text x="24" y="472" font-size="12" font-weight="600" fill="#78716c">寄付金額（円）</text>
  <rect x="20" y="482" width="350" height="52" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="518" font-size="22" fill="#0c0a09" font-weight="700" font-family="'Hiragino Mincho ProN',serif">15,000</text>
  <text x="354" y="515" font-size="14" fill="#78716c" text-anchor="end">円</text>

  <!-- Field: ワンストップ -->
  <text x="24" y="564" font-size="12" font-weight="600" fill="#78716c">ワンストップ特例申請</text>
  <rect x="20" y="574" width="350" height="44" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" rx="4"/>
  <text x="36" y="602" font-size="13" fill="#0c0a09">申請する</text>
  <!-- toggle on -->
  <rect x="318" y="584" width="40" height="24" rx="12" fill="#b91c1c"/>
  <circle cx="348" cy="596" r="9" fill="#ffffff"/>

  <!-- Save button -->
  <rect x="20" y="650" width="350" height="52" fill="#b91c1c" rx="4"/>
  <text x="195" y="683" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">記録を保存</text>

  <!-- Cancel -->
  <rect x="20" y="712" width="350" height="44" fill="#0c0a09" rx="4"/>
  <text x="195" y="740" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">キャンセル</text>
</svg>
