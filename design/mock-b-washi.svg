<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="'Hiragino Sans','Yu Gothic',sans-serif">
  <defs>
    <linearGradient id="bgB2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="btnB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="paperB" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.5  0 0 0 0 0.35  0 0 0 0 0.2  0 0 0 0.04 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bgB2)"/>
  <rect width="390" height="844" fill="#000" filter="url(#paperB)"/>

  <!-- Status bar -->
  <text x="28" y="30" font-size="14" font-weight="600" fill="#451a03">17:50</text>

  <!-- Header with rabbit silhouette -->
  <g transform="translate(28 75)">
    <g transform="scale(0.5)">
      <ellipse cx="0" cy="0" rx="14" ry="14" fill="#fef3c7" stroke="#7c2d12" stroke-width="2"/>
      <ellipse cx="-5" cy="-10" rx="2" ry="8" fill="#fbcfe8" stroke="#7c2d12" stroke-width="1.5"/>
      <ellipse cx="5" cy="-10" rx="2" ry="8" fill="#fbcfe8" stroke="#7c2d12" stroke-width="1.5"/>
    </g>
  </g>
  <text x="52" y="85" font-size="24" font-weight="700" fill="#451a03" font-family="'Hiragino Mincho ProN','Yu Mincho',serif">ホーム</text>
  <text x="28" y="110" font-size="12" fill="#92400e">2026年 寄付状況</text>

  <!-- Summary card -->
  <rect x="20" y="135" width="350" height="140" fill="#fffdf6" stroke="#fcd9a5" stroke-width="1" rx="14"/>
  <rect x="20" y="135" width="350" height="140" fill="#000" opacity="0.5" filter="url(#paperB)" rx="14"/>
  <text x="40" y="165" font-size="12" fill="#92400e">年間上限額 合計</text>
  <text x="40" y="208" font-size="34" font-weight="700" fill="#7c2d12" font-family="'Hiragino Mincho ProN',serif">¥124,000</text>
  <text x="40" y="232" font-size="11" fill="#a16207">使用額  ¥0  ／  残り  ¥124,000</text>
  <rect x="40" y="246" width="310" height="6" fill="#fef3c7" rx="3"/>
  <rect x="40" y="246" width="0" height="6" fill="url(#btnB)" rx="3"/>

  <!-- Members section -->
  <text x="28" y="305" font-size="13" font-weight="600" fill="#7c2d12" font-family="'Hiragino Mincho ProN',serif">— 家族メンバー —</text>

  <!-- Member card りの -->
  <rect x="20" y="320" width="350" height="95" fill="#fffdf6" stroke="#fcd9a5" stroke-width="1" rx="14"/>
  <g transform="translate(55 368)">
    <ellipse cx="0" cy="0" rx="22" ry="22" fill="#fef3c7" stroke="#7c2d12" stroke-width="1.8"/>
    <ellipse cx="-7" cy="-13" rx="3" ry="10" fill="#fbcfe8" stroke="#7c2d12" stroke-width="1.3"/>
    <ellipse cx="7" cy="-13" rx="3" ry="10" fill="#fbcfe8" stroke="#7c2d12" stroke-width="1.3"/>
    <circle cx="0" cy="20" r="4" fill="#fffdf6" stroke="#7c2d12" stroke-width="1.3"/>
  </g>
  <text x="100" y="350" font-size="17" font-weight="600" fill="#451a03" font-family="'Hiragino Mincho ProN',serif">りの</text>
  <text x="100" y="378" font-size="12" fill="#92400e">上限 ¥44,000</text>
  <text x="100" y="398" font-size="11" fill="#a16207">残り ¥44,000  (100%)</text>
  <rect x="240" y="375" width="110" height="6" fill="#fef3c7" rx="3"/>
  <rect x="240" y="375" width="110" height="6" fill="url(#btnB)" rx="3"/>

  <!-- Member card 母 -->
  <rect x="20" y="425" width="350" height="95" fill="#fffdf6" stroke="#fcd9a5" stroke-width="1" rx="14"/>
  <g transform="translate(55 473)">
    <ellipse cx="0" cy="0" rx="22" ry="22" fill="#fef3c7" stroke="#7c2d12" stroke-width="1.8"/>
    <ellipse cx="-7" cy="-13" rx="3" ry="10" fill="#fbcfe8" stroke="#7c2d12" stroke-width="1.3"/>
    <ellipse cx="7" cy="-13" rx="3" ry="10" fill="#fbcfe8" stroke="#7c2d12" stroke-width="1.3"/>
    <circle cx="0" cy="20" r="4" fill="#fffdf6" stroke="#7c2d12" stroke-width="1.3"/>
  </g>
  <text x="100" y="455" font-size="17" font-weight="600" fill="#451a03" font-family="'Hiragino Mincho ProN',serif">母</text>
  <text x="100" y="483" font-size="12" fill="#92400e">上限 ¥80,000</text>
  <text x="100" y="503" font-size="11" fill="#a16207">残り ¥80,000  (100%)</text>
  <rect x="240" y="480" width="110" height="6" fill="#fef3c7" rx="3"/>
  <rect x="240" y="480" width="110" height="6" fill="url(#btnB)" rx="3"/>

  <!-- CTA -->
  <rect x="20" y="560" width="350" height="52" fill="url(#btnB)" rx="14"/>
  <text x="195" y="593" font-size="16" font-weight="700" fill="#fffbeb" text-anchor="middle" font-family="'Hiragino Mincho ProN',serif">＋ 寄付を記録する</text>

  <rect x="20" y="625" width="350" height="48" fill="#fffdf6" stroke="#dc2626" stroke-width="1.5" rx="14"/>
  <text x="195" y="655" font-size="14" font-weight="600" fill="#dc2626" text-anchor="middle">返礼品を追加</text>

  <!-- Bottom nav -->
  <rect x="12" y="760" width="366" height="68" fill="#fffdf6" stroke="#fcd9a5" stroke-width="1" rx="18"/>
  <g font-size="10" text-anchor="middle">
    <circle cx="63" cy="790" r="4" fill="#b91c1c"/>
    <text x="63" y="815" font-weight="700" fill="#7c2d12">ホーム</text>
    <text x="158" y="815" fill="#a16207">寄付記録</text>
    <text x="253" y="815" fill="#a16207">返礼品</text>
    <text x="347" y="815" fill="#a16207">設定</text>
  </g>
</svg>
