<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <linearGradient id="noshiPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bgD)"/>
  <!-- noshi paper (diamond) -->
  <g transform="translate(256 260)">
    <polygon points="0,-170 130,0 0,170 -130,0" fill="url(#noshiPaper)" stroke="#a16207" stroke-width="2"/>
    <!-- red stripe across -->
    <polygon points="-130,0 130,0 110,26 -110,26" fill="#dc2626"/>
    <!-- mizuhiki cord on stripe -->
    <g fill="none" stroke-width="5" stroke-linecap="round">
      <path d="M -108 13 C -60 -8, 60 -8, 108 13" stroke="#dc2626"/>
      <path d="M -108 21 C -60 0, 60 0, 108 21" stroke="#ffffff"/>
      <path d="M -108 29 C -60 8, 60 8, 108 29" stroke="#fbbf24"/>
    </g>
    <!-- kanji 寿 -->
    <text x="0" y="-50" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="110" font-weight="700" fill="#7f1d1d" text-anchor="middle">寿</text>
    <!-- small noshi strip top -->
    <polygon points="0,-170 40,-220 -40,-220" fill="none" stroke="#a16207" stroke-width="2"/>
    <line x1="0" y1="-170" x2="0" y2="-215" stroke="#a16207" stroke-width="2"/>
  </g>
</svg>
