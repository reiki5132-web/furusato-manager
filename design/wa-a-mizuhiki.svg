<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <pattern id="seigaiha" x="0" y="0" width="64" height="32" patternUnits="userSpaceOnUse">
      <path d="M0 32 A 32 32 0 0 1 64 32" fill="none" stroke="#d97706" stroke-width="1.2" opacity="0.25"/>
      <path d="M-32 32 A 32 32 0 0 1 32 32" fill="none" stroke="#d97706" stroke-width="1.2" opacity="0.25"/>
      <path d="M32 32 A 32 32 0 0 1 96 32" fill="none" stroke="#d97706" stroke-width="1.2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bgA)"/>
  <rect width="512" height="512" rx="110" fill="url(#seigaiha)"/>
  <!-- gift box -->
  <rect x="136" y="240" width="240" height="170" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <rect x="136" y="240" width="240" height="40" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <!-- mizuhiki knot (red & white cords crossed) -->
  <g stroke-linecap="round" fill="none" stroke-width="10">
    <path d="M140 240 C 200 200, 240 180, 256 210 C 272 180, 312 200, 372 240" stroke="#dc2626"/>
    <path d="M140 260 C 200 220, 240 200, 256 230 C 272 200, 312 220, 372 260" stroke="#ffffff" stroke-width="8"/>
  </g>
  <circle cx="256" cy="215" r="14" fill="#dc2626"/>
  <circle cx="256" cy="215" r="6" fill="#fef2f2"/>
</svg>
