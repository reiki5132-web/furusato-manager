<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fecdd3"/>
      <stop offset="100%" stop-color="#fda4af"/>
    </linearGradient>
    <symbol id="petal" viewBox="-50 -50 100 100">
      <path d="M0 -45 C 20 -30, 22 -10, 8 0 L 0 5 L -8 0 C -22 -10, -20 -30, 0 -45 Z
               M 0 5 L -4 10 L 0 5 L 4 10 Z"
            fill="#ffffff"/>
    </symbol>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bgC)"/>
  <!-- big sakura flower, 5 petals -->
  <g transform="translate(256 256)">
    <g transform="rotate(0)"><use href="#petal" x="-50" y="-140" width="100" height="100"/></g>
    <g transform="rotate(72)"><use href="#petal" x="-50" y="-140" width="100" height="100"/></g>
    <g transform="rotate(144)"><use href="#petal" x="-50" y="-140" width="100" height="100"/></g>
    <g transform="rotate(216)"><use href="#petal" x="-50" y="-140" width="100" height="100"/></g>
    <g transform="rotate(288)"><use href="#petal" x="-50" y="-140" width="100" height="100"/></g>
    <circle r="22" fill="#fde047"/>
    <g stroke="#eab308" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-10" x2="0" y2="-32"/>
      <line x1="9" y1="-5" x2="28" y2="-16"/>
      <line x1="9" y1="5" x2="28" y2="16"/>
      <line x1="-9" y1="-5" x2="-28" y2="-16"/>
      <line x1="-9" y1="5" x2="-28" y2="-16"/>
    </g>
  </g>
  <!-- small falling petals -->
  <g fill="#ffffff" opacity="0.7">
    <ellipse cx="90" cy="120" rx="14" ry="9" transform="rotate(30 90 120)"/>
    <ellipse cx="430" cy="170" rx="12" ry="7" transform="rotate(-20 430 170)"/>
    <ellipse cx="120" cy="420" rx="11" ry="7" transform="rotate(-40 120 420)"/>
    <ellipse cx="420" cy="410" rx="13" ry="8" transform="rotate(15 420 410)"/>
  </g>
</svg>
